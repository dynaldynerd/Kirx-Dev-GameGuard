[Fireguard]
; Type 0 - no need enter fireguard after logout (not exit game)
; Type 1 - no need if hardware id matches last connect
Type = 0

[CharacterName]
; 0 - accept only a-z, A-Z, 0-9
; 1 - accept type 0 plus [ ] - ? ! +
Type = 0

[Bank]
; maximum money in bank
DalantLimit = 1000000000
GoldLimit = 500000

[PostMail]
; set false to disable mail system entirely
Enable = false

[NuclearWar]
Enable = true
AllMap = false

[Punishment]
; minutes. 1 day = 1440, default 4320 = 3 days
Duration = 4320

[SpecialistAbility]
Enable = false

[3rdClass]
Enable = false
IndexNewClass = 49

[Network]
Port_27780 = 27780
Port_27555 = 27555
Port_27556 = 27556

[TaxRate]
; set true to disable tax on all races
SetZero = false

[SkipTutorial]
; skip tutorial after creating characters
Enable = false

[anticheat]
; Cheat scoring thresholds
warn_threshold = 50
kick_threshold = 100
ban_threshold = 200

; Score points removed per minute (rehabilitation)
score_decay_rate = 5.0

; Max packets per second before flood detection
max_packets_per_second = 60
; Consecutive flood seconds before kick
packet_flood_kick_count = 5

; HWID tracking and blocking
hwid_tracking = true
hwid_blocking = true

; Periodic integrity check interval (ms)
check_interval_ms = 10000

[setitem]
; Maximum set item effects allowed
max_effects = 6

[trap]
; Minimum level to create traps
min_level = 30
